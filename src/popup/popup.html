<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="../content/font-config.js"></script>
  <script src="popup.js"></script>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="icon">Aa</div>
      <h1 class="title">目に優しいフォント置換</h1>
    </div>

    <div class="status-card">
      <div class="status-row">
        <div class="status-indicator">
          <span class="dot active" id="status-dot"></span>
          <span class="status-text" id="status-text">動作中</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="enabled-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <p class="description">読みづらいフォントを好みの日本語フォントに自動置換します</p>
    </div>

    <div class="settings-section">
      <h2 class="section-title">フォント設定</h2>

      <div class="setting-row">
        <label class="setting-label" for="body-font">本文フォント</label>
        <div class="setting-controls">
          <select id="body-font" class="font-select">
          </select>
          <select id="body-weight" class="weight-select">
            <option value="400">Regular</option>
            <option value="500">Medium</option>
          </select>
        </div>
      </div>

      <div class="setting-row">
        <label class="setting-label" for="mono-font">等幅フォント</label>
        <select id="mono-font" class="font-select">
        </select>
      </div>

      <div class="save-notice" id="save-notice">
        ページを再読み込みすると反映されます
      </div>
    </div>

    <div class="footer">
      <p class="version" id="version">v-.-.-</p>
    </div>
  </div>
</body>

</html>
