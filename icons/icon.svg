<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- メイングラデーション（拡張機能テーマカラー） -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>

    <!-- 文字用の白グラデーション -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8ff;stop-opacity:0.95" />
    </linearGradient>

    <!-- キラキラ用グラデーション -->
    <linearGradient id="sparkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>

    <!-- ソフトシャドウ -->
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <!-- テキストシャドウ -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#4a3a8a" flood-opacity="0.4"/>
    </filter>

    <!-- キラキラグロー -->
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景（角丸） -->
  <rect width="512" height="512" rx="108" fill="url(#bgGradient)"/>

  <!-- 装飾サークル（ガラスモーフィズム風） -->
  <circle cx="80" cy="80" r="120" fill="white" opacity="0.08"/>
  <circle cx="440" cy="440" r="100" fill="white" opacity="0.06"/>
  <circle cx="400" cy="120" r="60" fill="white" opacity="0.05"/>

  <!-- メイン文字「あ」 -->
  <g filter="url(#textShadow)">
    <text x="240" y="355"
          font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', 'Meiryo', sans-serif"
          font-size="300"
          font-weight="700"
          fill="url(#textGradient)"
          text-anchor="middle">あ</text>
  </g>

  <!-- 置換矢印（右上に小さく） -->
  <g transform="translate(370, 100)" filter="url(#softShadow)">
    <!-- 循環矢印 -->
    <g fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <!-- 上の矢印弧 -->
      <path d="M 0,30 A 30,30 0 0 1 52,8"/>
      <polyline points="44,-4 54,8 42,16"/>
      <!-- 下の矢印弧 -->
      <path d="M 60,30 A 30,30 0 0 1 8,52"/>
      <polyline points="16,44 6,52 18,62"/>
    </g>
  </g>

  <!-- キラキラ（左上） -->
  <g filter="url(#sparkGlow)" transform="translate(90, 115)">
    <!-- 四方向の星 -->
    <path d="M 0,-18 L 4,-4 L 18,0 L 4,4 L 0,18 L -4,4 L -18,0 L -4,-4 Z"
          fill="url(#sparkGradient)"/>
  </g>

  <!-- キラキラ（小・右上寄り） -->
  <g filter="url(#sparkGlow)" transform="translate(340, 170)">
    <path d="M 0,-10 L 2.5,-2.5 L 10,0 L 2.5,2.5 L 0,10 L -2.5,2.5 L -10,0 L -2.5,-2.5 Z"
          fill="white" opacity="0.8"/>
  </g>

  <!-- キラキラ（小・左下） -->
  <g filter="url(#sparkGlow)" transform="translate(120, 400)">
    <path d="M 0,-12 L 3,-3 L 12,0 L 3,3 L 0,12 L -3,3 L -12,0 L -3,-3 Z"
          fill="white" opacity="0.7"/>
  </g>
</svg>
