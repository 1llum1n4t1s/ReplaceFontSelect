name: Publish to Chrome Web Store & Firefox AMO

# ブランチ命名規約:
#   release/X.Y.Z (例: release/3.0.0)
#
# `release/<X.Y.Z>` への push で variant matrix を並列実行 (default + notosans)。
# 全 variant が同じ version を共有し、 matrix strategy で並列公開する。
# variants/<name>.json の version とブランチ末尾の X.Y.Z が一致する必要がある。
#
# 公開先:
#   - Chrome Web Store (chrome-webstore-upload-cli 経由、 --auto-publish)
#   - Firefox AMO (web-ext sign --channel=listed、 web-ext 10+ では submission API がデフォルト)

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  publish:
    name: Publish ${{ matrix.variant }}
    runs-on: ubuntu-latest
    # matrix で全 variant を並列実行。1 variant が失敗しても他は続行。
    strategy:
      fail-fast: false
      matrix:
        variant: [default, notosans]
    steps:
      - name: リポジトリをチェックアウト
        # actions/checkout v5.0.0 (SHA pinned for supply chain security)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: ブランチ名から version を抽出
        id: parse
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          # 期待形式: release/<X.Y.Z>
          if [[ ! "$BRANCH" =~ ^release/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::ブランチ名がフォーマット release/<X.Y.Z> に一致しません: $BRANCH"
            exit 1
          fi
          version="${BASH_REMATCH[1]}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "🎯 version=$version (variant=${{ matrix.variant }})"

      - name: バリアントの version とブランチ version の整合性チェック
        env:
          VARIANT: ${{ matrix.variant }}
          BRANCH_VERSION: ${{ steps.parse.outputs.version }}
        run: |
          if [ ! -f "variants/${VARIANT}.json" ]; then
            echo "::error::variants/${VARIANT}.json が見つかりません"
            exit 1
          fi
          variant_version=$(node -p "require('./variants/${VARIANT}.json').version")
          if [ "$variant_version" != "$BRANCH_VERSION" ]; then
            echo "::error::variants/${VARIANT}.json の version ($variant_version) とブランチ ($BRANCH_VERSION) が一致しません"
            exit 1
          fi
          echo "✅ variants/${VARIANT}.json の version とブランチ一致: $variant_version"

      - name: pnpm セットアップ
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 11

      - name: Node セットアップ
        # actions/setup-node v5.0.0 (SHA pinned)
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          # pnpm 11 は Node.js v22.13+ を要求するため 22 系に固定 (pnpm/action-setup で v11 を導入)
          node-version: '22'
          cache: 'pnpm'

      - name: 依存インストール
        run: pnpm install --frozen-lockfile

      - name: アイコン生成
        env:
          VARIANT: ${{ matrix.variant }}
        run: node scripts/generate-icons.js "$VARIANT"

      - name: フォント変換（TTFがある場合）
        run: |
          if ls src/fonts/*.ttf >/dev/null 2>&1; then
            node scripts/convert-fonts.js
          else
            echo "TTFファイルなし、スキップ"
          fi

      - name: CSS生成
        run: node scripts/generate-css.js

      - name: variant manifest / variant.js を生成
        env:
          VARIANT: ${{ matrix.variant }}
        run: node scripts/build-variant.js "$VARIANT"

      - name: 生成された manifest の version を確認
        env:
          BRANCH_VERSION: ${{ steps.parse.outputs.version }}
        run: |
          manifest_version=$(node -p "require('./manifest.json').version")
          if [ "$manifest_version" != "$BRANCH_VERSION" ]; then
            echo "::error::manifest.json の version ($manifest_version) とブランチ ($BRANCH_VERSION) が一致しません"
            exit 1
          fi
          echo "✅ manifest.json の version: $manifest_version"

      - name: zip パッケージを作成
        env:
          VARIANT: ${{ matrix.variant }}
        run: |
          zip_base=$(node -p "require('./variants/${VARIANT}.json').zipBaseName")
          zip_path="${zip_base}-chrome.zip"
          variant_icons_dir="icons/${VARIANT}"
          if [ ! -d "$variant_icons_dir" ]; then
            echo "::error::variant 用のアイコンディレクトリが見つかりません: $variant_icons_dir"
            exit 1
          fi
          # v3.0.3 戦略: replacefont-extension.css を WAR から fetch するので配布に含める。
          # (P1-7) lockedFonts variant (notosans 等) では popup UI が無く preset 切替が発生しないので、
          # lockedFonts に対応する 1 個の preset JS だけ同梱して残り 35 個を除外する (約 -2.43 MB)。
          extra_excludes=""
          locked_preset=$(node -e '
            const v = require("./variants/" + process.env.VARIANT + ".json");
            if (!v.lockedFonts) process.exit(0);
            const b = v.lockedFonts.bodyFont, m = v.lockedFonts.monoFont, w = v.lockedFonts.bodyFontWeight;
            if (b && m && w) console.log("preset-" + b + "-" + m + "-w" + w + ".js");
          ')
          if [ -n "$locked_preset" ]; then
            echo "🎯 lockedFonts variant ($VARIANT): preset を $locked_preset だけ同梱 (他は除外)"
            for f in src/css/preset-*.js; do
              base=$(basename "$f")
              if [ "$base" != "$locked_preset" ]; then
                extra_excludes="$extra_excludes $f"
              fi
            done
          fi
          # shellcheck disable=SC2086
          zip -r "$zip_path" manifest.json "$variant_icons_dir" src \
            -x "*.DS_Store" "*.swp" "*~" "*/preview.html" $extra_excludes
          ls -lh "$zip_path"
          echo "ZIP_PATH=$zip_path" >> "$GITHUB_ENV"

      - name: variant に対応する EXTENSION_ID を決定
        id: ext
        env:
          VARIANT: ${{ matrix.variant }}
          ID_DEFAULT: ${{ secrets.CWS_EXTENSION_ID_DEFAULT }}
          ID_NOTOSANS: ${{ secrets.CWS_EXTENSION_ID_NOTOSANS }}
        run: |
          case "$VARIANT" in
            default)
              extension_id="$ID_DEFAULT"
              ;;
            notosans)
              extension_id="$ID_NOTOSANS"
              ;;
            *)
              echo "::error::未対応の variant: $VARIANT (publish.yml の matrix と case を更新してください)"
              exit 1
              ;;
          esac
          if [ -z "$extension_id" ]; then
            echo "::error::variant=$VARIANT に対応する CWS_EXTENSION_ID_* secret が空です"
            exit 1
          fi
          echo "extension_id=$extension_id" >> "$GITHUB_OUTPUT"

      - name: Chrome Web Store にアップロード & 公開
        # chrome-webstore-upload-cli v4: 認証情報は CLI フラグ廃止・環境変数のみ
        # (CLIENT_ID / CLIENT_SECRET / REFRESH_TOKEN / PUBLISHER_ID / EXTENSION_ID)。
        # サブコマンドなしで upload + publish を一括実行 (--auto-publish は v4 で削除)。
        env:
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          EXTENSION_ID: ${{ steps.ext.outputs.extension_id }}
        # chrome-webstore-upload-cli は devDependencies に固定し、pnpm install --frozen-lockfile で
        # pnpm-lock.yaml の integrity hash 検証済みのローカル版を pnpm exec で呼ぶ
        run: |
          pnpm exec chrome-webstore-upload --source "$ZIP_PATH"
          echo "🎉 ${{ matrix.variant }} → Chrome Web Store への公開リクエスト送信完了"

      - name: Firefox 用ソースディレクトリを準備
        # Chrome step が失敗 (同 version 再 upload 等) しても Firefox AMO は独立して
        # 実行する必要があるので、success() に加え failure() の場合も実行する
        # (cancelled 時は skip)。
        if: ${{ success() || failure() }}
        env:
          VARIANT: ${{ matrix.variant }}
        # web-ext sign の --source-dir に渡すための、Chrome ZIP と同じ内容を持つ
        # クリーンなディレクトリを構築する。manifest.json + icons/<variant> + src のみ。
        # Firefox AMO の MV3 validator は service_worker 単独を reject するため、
        # --firefox フラグで manifest.json を再生成して background.scripts を併記。
        # Chrome step はこれより前に実行済みなので、 Chrome 用 manifest が上書きされても問題ない。
        run: |
          firefox_dir="firefox-build"
          variant_icons_dir="icons/${VARIANT}"
          if [ ! -d "$variant_icons_dir" ]; then
            echo "::error::variant 用のアイコンディレクトリが見つかりません: $variant_icons_dir"
            exit 1
          fi
          node scripts/build-variant.js "${VARIANT}" --firefox
          rm -rf "$firefox_dir"
          mkdir -p "$firefox_dir/icons"
          cp manifest.json "$firefox_dir/"
          cp -r "$variant_icons_dir" "$firefox_dir/icons/${VARIANT}"
          cp -r src "$firefox_dir/src"
          # ストア配信に不要なファイルを除外 (Chrome ZIP と同じポリシー + TTF 除外)。
          # v3.0.3 戦略: replacefont-extension.css は WAR から fetch するので配布に含める (削除しない)。
          find "$firefox_dir" \( \
            -name "*.DS_Store" -o \
            -name "*.swp" -o \
            -name "*~" -o \
            -name "preview.html" -o \
            -name "*.ttf" \
          \) -delete
          # (P1-7) lockedFonts variant: 必要な 1 preset 以外を削除
          locked_preset=$(node -e '
            const v = require("./variants/" + process.env.VARIANT + ".json");
            if (!v.lockedFonts) process.exit(0);
            const b = v.lockedFonts.bodyFont, m = v.lockedFonts.monoFont, w = v.lockedFonts.bodyFontWeight;
            if (b && m && w) console.log("preset-" + b + "-" + m + "-w" + w + ".js");
          ')
          if [ -n "$locked_preset" ]; then
            find "$firefox_dir/src/css" -name "preset-*.js" -not -name "$locked_preset" -delete
          fi
          echo "FIREFOX_SOURCE_DIR=$firefox_dir" >> "$GITHUB_ENV"
          echo "📦 Firefox source dir contents:"
          ls -la "$firefox_dir"

      - name: Firefox AMO に submission API でアップロード
        # Chrome 失敗時も実行する (前 step の Firefox ディレクトリ準備が success なら OK)。
        if: ${{ success() || failure() }}
        env:
          # web-ext は WEB_EXT_API_KEY / WEB_EXT_API_SECRET を環境変数から読む
          # AMO API キーは全 variant 共通（同一 Mozilla アカウントの JWT）
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        # web-ext は devDependencies に固定し、pnpm install --frozen-lockfile で integrity 検証済みの
        # ローカル版を pnpm exec で呼ぶ（Chrome 側と同じサプライチェーン方針）
        run: |
          if [ -z "$WEB_EXT_API_KEY" ] || [ -z "$WEB_EXT_API_SECRET" ]; then
            echo "::error::AMO_JWT_ISSUER / AMO_JWT_SECRET の GitHub Secrets が未設定です"
            exit 1
          fi
          # web-ext 10+ では submission API がデフォルト動作。
          # --use-submission-api フラグは廃止されたので渡さない。
          pnpm exec web-ext sign \
            --source-dir="$FIREFOX_SOURCE_DIR" \
            --artifacts-dir="web-ext-artifacts" \
            --channel=listed
          echo "🦊 ${{ matrix.variant }} → Firefox AMO への submission 送信完了 (レビュー待ち)"
