name: Publish to Chrome Web Store

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  publish:
    name: Chrome Web Store 公開
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        # actions/checkout v5.0.0 (SHA pinned for supply chain security)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: バージョンを取得
        id: version
        run: |
          version=$(grep -oP '(?<="version": ")[^"]+' manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "📦 公開対象バージョン: $version"

      - name: ブランチ名とバージョンの整合性を確認
        env:
          BRANCH_VERSION: ${{ github.ref_name }}
          MANIFEST_VERSION: ${{ steps.version.outputs.version }}
        run: |
          expected="release/${MANIFEST_VERSION}"
          if [ "$BRANCH_VERSION" != "$expected" ]; then
            echo "::error::ブランチ名 ($BRANCH_VERSION) と manifest.json のバージョン ($MANIFEST_VERSION) が一致しません。期待値: $expected"
            exit 1
          fi
          echo "✅ ブランチ名と manifest バージョン一致: $expected"

      - name: Node セットアップ
        # actions/setup-node v5.0.0 (SHA pinned)
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存インストール
        # npm ci のみ: lockfile との不整合 (例: 手動編集 / インジェクション) を検出して失敗させる
        run: npm ci

      - name: アイコン生成
        run: node scripts/generate-icons.js

      - name: フォント変換（TTFがある場合）
        run: |
          if ls src/fonts/*.ttf >/dev/null 2>&1; then
            node scripts/convert-fonts.js
          else
            echo "TTFファイルなし、スキップ"
          fi

      - name: CSS生成
        run: node scripts/generate-css.js

      - name: zip パッケージを作成
        run: |
          zip -r replace-font-select-chrome.zip manifest.json icons src \
            -x "*.DS_Store" "*.swp" "*~"
          ls -lh replace-font-select-chrome.zip

      - name: Chrome Web Store にアップロード & 公開
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        # chrome-webstore-upload-cli は devDependencies に固定し、npm ci で
        # package-lock.json の integrity hash 検証済みのローカル版を --no で呼ぶ
        # （npx --yes はネットワーク取得でハッシュ未検証になるため避ける）
        run: |
          npx --no chrome-webstore-upload upload \
            --source replace-font-select-chrome.zip \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN" \
            --auto-publish
          echo "🎉 Chrome Web Store への公開リクエストを送信したよ〜"
